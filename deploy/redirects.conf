# ============================================================
# STRIXEVO — 301 redirects from the old flat URL scheme to the
# new /blog/ and /setup/ structure. Preserves SEO + old links.
#
# Usage: include inside the `server { }` block of the site's
# nginx config, e.g.:
#     include /var/www/html/deploy/redirects.conf;
# then: sudo nginx -t && sudo systemctl reload nginx
# ============================================================

# ---- Blog posts: /<slug> and /<slug>.html -> /blog/<slug>.html ----
location = /what-a-design-review-changed        { return 301 /blog/what-a-design-review-changed.html; }
location = /what-a-design-review-changed.html   { return 301 /blog/what-a-design-review-changed.html; }
